<script>
    document.getElementById('ticketForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('customerName').value;
      const device = document.getElementById('device').value;
      const issue = document.getElementById('issue').value;
      
      const ticketId = 'TCK-' + Math.floor(1000 + Math.random() * 9000);
      const date = new Date().toLocaleDateString();

      document.getElementById('r-ticket').innerText = ticketId;
      document.getElementById('r-date').innerText = date;
      document.getElementById('r-name').innerText = name;
      document.getElementById('r-device').innerText = device;
      document.getElementById('r-issue').innerText = issue;

      const qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML = ""; 
      
      // DYNAMIC URL FIX: This automatically grabs your vercel domain
      // and points to a new track.html file
      const trackingUrl = window.location.origin + "/track.html?id=" + ticketId; 
      
      new QRCode(qrContainer, {
        text: trackingUrl,
        width: 128,
        height: 128,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.L
      });

      setTimeout(() => {
        window.print();
        document.getElementById('ticketForm').reset();
      }, 300);
    });
  </script>
